<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <style>
      .main { fill: #fb7185; }
      .pupil { fill: #ffffff; }
      .dot { fill: #fb7185; }
      @media (prefers-color-scheme: dark) {
        .pupil { fill: #0f0f12; }
      }
    </style>
  </defs>

  <!-- Crown/forehead (▗▄███▄▖) -->
  <rect x="30" y="4" width="68" height="28" rx="5" class="main"/>
  <rect x="18" y="16" width="16" height="16" rx="4" class="main" opacity="0.5"/>
  <rect x="94" y="16" width="16" height="16" rx="4" class="main" opacity="0.5"/>

  <!-- Side bars (▐ ▌) -->
  <rect x="10" y="38" width="12" height="40" rx="3" class="main" opacity="0.6"/>
  <rect x="106" y="38" width="12" height="40" rx="3" class="main" opacity="0.6"/>

  <!-- Left eye (◈) -->
  <polygon points="38,38 56,56 38,74 20,56" class="main" opacity="0.85"/>
  <circle cx="38" cy="56" r="6" class="pupil"/>
  <circle cx="38" cy="56" r="2.5" class="dot"/>

  <!-- Right eye (◈) -->
  <polygon points="90,38 108,56 90,74 72,56" class="main" opacity="0.85"/>
  <circle cx="90" cy="56" r="6" class="pupil"/>
  <circle cx="90" cy="56" r="2.5" class="dot"/>

  <!-- Beak (▼) -->
  <polygon points="64,42 76,66 52,66" class="main"/>

  <!-- Jaw (▀▄█▄▀) -->
  <rect x="42" y="88" width="44" height="22" rx="5" class="main"/>
  <rect x="30" y="88" width="16" height="14" rx="4" class="main" opacity="0.6"/>
  <rect x="82" y="88" width="16" height="14" rx="4" class="main" opacity="0.6"/>
</svg>
